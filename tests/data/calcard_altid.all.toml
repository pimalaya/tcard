# vCard 4.0 as TOML, edited by tcard.
#
# Fill what you need; empty fields are ignored. Properties
# tcard does not model are kept verbatim, not shown here.

full-name = "altid"	# required
kind = ""		# individual, group, org
nickname = []
organization = []
title = ""
role = ""
categories = []
language = []		# en, fr
birthday = ""		# 1990-05-23
anniversary = ""	# 2014-09-21
geo = ""		# geo:37.78,-122.40
timezone = ""		# America/New_York
note = "RFC6350 requires N to have cardinality <=1 but allows alternative representations to be included if they are linked by the ALTID parameter."

[name]
family = "representation"
given = "one"
additional = ""
prefixes = ""
suffixes = ""

[gender]
sex = ""	# F, M, O, N, U
identity = ""

[[email]]
type = ""	# home, work
value = ""	# email address

[[phone]]
type = ""	# home, work, cell, fax, voice, video, pager, text, textphone
value = ""	# +1-555-0100

[[address]]
type = ""	# home, work
street = ""
locality = ""
region = ""
code = ""
country = ""

[[photo]]
value = ""	# file:// or https://

[[url]]
type = ""	# home, work
value = ""	# https://example.com

[[messaging]]
type = ""	# home, work
value = ""	# xmpp:jane@example.com
