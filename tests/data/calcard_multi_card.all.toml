timezone = ""			# America/New_York
note = ""

[card.name]	# required
family = "Stenerson"
given = "Derik"
additional = ""
prefixes = ""
suffixes = ""

[card.gender]
sex = ""	# F, M, O, N, U
identity = ""

[[card.email]]
type = "INTERNET"		# home, work
value = "deriks@Microsoft.com"	# email address

[[card.phone]]
